version: '3.8'

services:
  postgres:
    container_name: nest-clean-pg
    image: postgres:16.0-alpine3.18
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PG_DATA: ./data/pg:/data/postgres
    volumes:
      - ./data/pg:/data/postgres
